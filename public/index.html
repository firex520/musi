<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura Music | Your Music Universe</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="app-container">
        <!-- Sidebar -->
        <nav class="sidebar">
            <div class="sidebar-box">
                <ul class="nav-list">
                    <li><a href="#" class="nav-item active" id="nav-home"><i class="fas fa-home"></i> Home</a></li>
                    <li><a href="#" class="nav-item" id="nav-search"><i class="fas fa-search"></i> Search</a></li>
                </ul>
            </div>

            <div class="sidebar-box library-box">
                <div class="library-header">
                    <h3><i class="fas fa-book"></i> Your Library</h3>
                    <button class="add-playlist-btn" id="add-playlist-btn" title="Create Playlist"><i
                            class="fas fa-plus"></i></button>
                </div>

                <div id="playlist-list">
                    <div class="playlist-item" id="nav-liked">
                        <div class="playlist-img liked-playlist-img">
                            <i class="fas fa-heart"></i>
                        </div>
                        <div class="playlist-info">
                            <div class="playlist-name">Liked Songs</div>
                            <div class="playlist-meta" id="liked-count">0 songs</div>
                        </div>
                    </div>
                    <!-- Dynamic playlists injected here -->
                </div>
            </div>
        </nav>

        <!-- Main Content -->
        <main class="main-content" id="main-content">
            <header>
                <div class="search-container" id="search-container">
                    <i class="fas fa-search"></i>
                    <input type="text" id="search-input" placeholder="What do you want to listen to?">
                </div>
            </header>

            <div id="content-view">
                <!-- Home View -->
                <div id="home-view">
                    <h2 class="view-title">Welcome back</h2>
                    <div class="results-grid" id="home-grid">
                        <!-- Suggestions or recent activity -->
                        <div class="empty-state">
                            <p>Discover new music by searching above.</p>
                        </div>
                    </div>
                </div>

                <!-- Search View -->
                <div id="search-view" style="display: none;">
                    <h2 class="view-title">Search Results</h2>
                    <div class="results-grid" id="search-results"></div>
                </div>

                <!-- Liked Songs View -->
                <div id="liked-view" style="display: none;">
                    <h2 class="view-title">Liked Songs</h2>
                    <div class="results-grid" id="liked-grid"></div>
                </div>

                <!-- Generic Playlist View -->
                <div id="playlist-view" style="display: none;">
                    <h2 class="view-title" id="playlist-view-title">Playlist Name</h2>
                    <div class="results-grid" id="playlist-grid"></div>
                </div>

                <!-- Queue View -->
                <div id="queue-view" style="display: none;">
                    <h2 class="view-title">Queue</h2>
                    <div class="results-grid" id="queue-grid"></div>
                </div>
            </div>
        </main>

        <!-- Player Bar -->
        <footer class="player-bar">
            <div class="player-left">
                <img id="current-song-thumb" class="player-thumb" src="" alt="">
                <div class="player-track-info" id="player-track-info">
                    <h4 id="current-song-title">Select a song</h4>
                    <p id="current-song-artist"></p>
                </div>
                <button class="like-btn" id="player-like-btn" style="display: none;"><i
                        class="far fa-heart"></i></button>
            </div>

            <div class="player-center">
                <div class="player-controls">
                    <button class="control-btn" id="shuffle-btn"><i class="fas fa-shuffle"></i></button>
                    <button class="control-btn" id="prev-btn"><i class="fas fa-backward-step"></i></button>
                    <button class="main-play-btn" id="play-pause-btn"><i class="fas fa-play"></i></button>
                    <button class="control-btn" id="next-btn"><i class="fas fa-forward-step"></i></button>
                    <button class="control-btn" id="repeat-btn"><i class="fas fa-repeat"></i></button>
                </div>
                <div class="progress-container">
                    <span id="current-time">0:00</span>
                    <div class="progress-bar" id="progress-bar">
                        <div class="progress-fill" id="progress-fill"></div>
                    </div>
                    <span id="total-time">0:00</span>
                </div>
            </div>

            <div class="player-right">
                <button class="control-btn" id="nav-queue" title="Queue"><i class="fas fa-list-ul"></i></button>
                <button class="control-btn"><i class="fas fa-volume-high"></i></button>
            </div>
        </footer>
    </div>

    <!-- Hidden YouTube Player -->
    <div id="yt-player-container"></div>

    <!-- Context Menu -->
    <div id="context-menu" class="context-menu">
        <ul class="context-list">
            <li id="cm-play-next"><i class="fas fa-arrow-right"></i> Play Next</li>
            <li id="cm-add-queue"><i class="fas fa-list-ul"></i> Add to Queue</li>
            <li class="context-divider"></li>
            <li id="cm-add-playlist"><i class="fas fa-plus"></i> Add to Playlist <i class="fas fa-chevron-right"
                    style="margin-left: auto; font-size: 0.8rem;"></i>
                <ul class="submenu" id="playlist-submenu">
                    <!-- Dynamic playlists here -->
                </ul>
            </li>
        </ul>
    </div>

    <!-- Playlist Modal -->
    <div id="playlist-modal" class="modal">
        <div class="modal-content">
            <h3>New Playlist</h3>
            <input type="text" id="playlist-name-input" placeholder="Give your playlist a name">
            <div class="modal-actions">
                <button id="modal-cancel">Cancel</button>
                <button id="modal-create" class="primary-btn">Create</button>
            </div>
        </div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="script.js"></script>
</body>

</html>
